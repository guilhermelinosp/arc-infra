name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$(date +%s)" \
            --repo "${{ github.repository }}" \
            --title "Release $(date +%Y-%m-%d)" \
            --generate-notes
