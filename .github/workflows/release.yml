name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Create release
        id: semver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            echo "No previous release. Creating v1.0.0"
            TAG="v1.0.0"
            NOTES_ARGS="--generate-notes"
          else
            TAG_NUM=${LATEST#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_NUM"
            MAJOR=${MAJOR:-1}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
            PATCH=$((PATCH + 1))
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
            NOTES_ARGS="--generate-notes --notes-start-tag $LATEST"
          fi

          echo "Creating $TAG"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            $NOTES_ARGS
