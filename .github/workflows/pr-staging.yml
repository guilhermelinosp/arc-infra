name: pr-staging

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - staging

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          HEAD="${{ github.head_ref }}"
          BASE="${{ github.base_ref }}"
          echo "PR: $HEAD → $BASE"
          case "$HEAD" in
            feature/*|bugfix/*) echo "✅ $HEAD → staging" ;;
            *) echo "❌ Para staging, use feature/* ou bugfix/*"; exit 1 ;;
          esac

  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+'; then
            echo "✅ PR title: $TITLE"
          else
            echo "❌ PR title deve seguir Conventional Commits"
            echo "   Ex: feat(auth): adiciona login com Google"
            exit 1
          fi

      - name: Validate commits
        run: |
          git fetch origin ${{ github.base_ref }}
          COMMITS=$(git log --oneline origin/${{ github.base_ref }}..HEAD 2>/dev/null)
          ERR=0
          echo "$COMMITS" | while read line; do
            if echo "$line" | grep -q '^Merge'; then continue; fi
            if ! echo "$line" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+'; then
              echo "❌ $line"
              ERR=1
            fi
          done
          exit $ERR
