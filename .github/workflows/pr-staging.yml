name: pr-staging

on:
  pull_request:
    types: [opened, synchronize]
    branches: [staging]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate branch
        run: |
          case "${{ github.head_ref }}" in
            feature/*|bugfix/*|fix/*|chore/*) echo "✅ ${{ github.head_ref }} → staging" ;;
            *) echo "❌ Use feature/*, bugfix/*, fix/* ou chore/*"; exit 1 ;;
          esac
      - name: Validate PR title
        run: |
          echo "${{ github.event.pull_request.title }}" | grep -qE '^(feat|fix|docs|style|ref|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+' \
            && echo "✅ PR title" || { echo "❌ Deve seguir Conventional Commits"; exit 1; }
      - name: Validate commits
        run: |
          git fetch origin ${{ github.base_ref }} 2>/dev/null || true
          git log --oneline origin/${{ github.base_ref }}..HEAD 2>/dev/null | while read line; do
            [ "$(echo "$line" | grep -c '^Merge')" -gt 0 ] && continue
            MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
            echo "$MSG" | grep -qE '^(feat|fix|docs|style|ref|refactor|test|chore|ci|perf|build|revert)(\(.+\))?!?:\s.+' \
              && echo "✅ $MSG" || { echo "❌ $MSG"; exit 1; }
          done
