name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create release
        run: |
          VERSION="v1.0.0"
          gh release create "$VERSION" \
            --repo ${{ github.repository }} \
            --title "$VERSION" \
            --generate-notes \
            --target ${{ github.sha }}
