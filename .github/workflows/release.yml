name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Bump version
        id: semver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then echo "tag=v1.0.0" >> $GITHUB_OUTPUT; echo "first=true" >> $GITHUB_OUTPUT; exit 0; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          MAJOR=${MAJOR:-1}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          git log --format="%s" "$LATEST..HEAD" 2>/dev/null | grep -q "BREAKING CHANGE\|!:" && { MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0; } \
            || git log --format="%s" "$LATEST..HEAD" 2>/dev/null | grep -q "^feat" && { MINOR=$((MINOR+1)); PATCH=0; } \
            || PATCH=$((PATCH+1))
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ "${{ steps.semver.outputs.first }}" = "true" ] && NOTES="" || NOTES="--notes-start-tag ${{ steps.semver.outputs.latest }}"
          gh release create "${{ steps.semver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.semver.outputs.tag }}" \
            --generate-notes $NOTES
