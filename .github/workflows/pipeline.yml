name: pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    if: github.event_name == 'pull_request'
    uses: guilhermelinosp/ci-templates/.github/workflows/branch-rules.yml@latest

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@latest
    with:
