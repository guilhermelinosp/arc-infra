name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        run: |
          gh release create "v$(date +%s)" \
            --repo "${{ github.repository }}" \
            --title "Release $(date +%Y-%m-%d)" \
            --generate-notes
